body:
  text: 詩登郁洲山望海滄潦聯霄岫層嶺鬱巑崱下盤鹽海底上轉靈烏翼滇㴐非可辨鴻溶信難測輕塵久弭飛驚浪終不息雲錦曜石嶼羅綾文水色類聚八詩紀九十自江州還入石頭詩自江州還入石頭詩鼓枻浮大川延睇洛城觀洛城何鬱鬱杳與雲霄半前望蒼龍門斜瞻白鶴館槐垂御溝道柳綴金隄岸迅馬晨風趨輕輿流水散高歌梁塵下絙瑟荊禽亂我思江海遊曾無朝市玩忽寄靈臺宿空軫及關歎仲子入南楚伯鸞出東漢何能栖樹枝取斃王孫彈類聚二十八廣文選九並作江州還入石頭詩文苑英華二百八十九逸作者名詩紀九十始居山營室始居山營室自昔厭喧囂執志好栖息嘯歌棄城市歸來事耕織鑿戶窺嶕嶢開軒望嶄崱激水簷前溜修竹堂陰植香風鳴紫鶯高梧巢緑翼泉脈洞沓沓流波下不極髣佛玉山隈想像瑤池側夜誦神仙記旦吸雲霞色將馭六龍輿行從三鳥食誰與金門士撫心論胸臆類聚三十六廣文選十五作居山營室詩紀九十出塞薊門秋氣清飛將出長城絶漠衝風急交河夜月明陷敵摐金鼓摧鋒揚旆旌去去無終極日暮動邊聲文苑英華百九十七樂府詩集二十一詩紀九十
